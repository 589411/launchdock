<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Noto Sans TC', sans-serif">
  <rect x="1" y="1" width="798" height="518" rx="12" fill="#f8fafc" stroke="#d0d7de" stroke-width="2"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f3460">工具商業風險評估表</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#24292f">你搭的積木要建在穩固的地基上</text>

  <!-- header -->
  <rect x="50" y="84" width="700" height="40" rx="6" fill="#0f3460"/>
  <text x="70" y="110" font-size="14" font-weight="bold" fill="#ffffff">工具</text>
  <text x="330" y="110" font-size="14" font-weight="bold" fill="#ffffff">商業模式</text>
  <text x="630" y="110" font-size="14" font-weight="bold" fill="#ffffff">風險評級</text>

  <!-- rows -->
  <rect x="50" y="128" width="700" height="46" fill="#ffffff" stroke="#d0d7de"/>
  <text x="70" y="156" font-size="14" fill="#24292f">Claude / ChatGPT</text>
  <text x="330" y="156" font-size="14" fill="#24292f">自有模型，訂閱 + API</text>
  <text x="630" y="156" font-size="14" font-weight="bold" fill="#2e7d32">🟢 低</text>

  <rect x="50" y="174" width="700" height="46" fill="#ffffff" stroke="#d0d7de"/>
  <text x="70" y="202" font-size="14" fill="#24292f">Gemini</text>
  <text x="330" y="202" font-size="14" fill="#24292f">Google 生態，自有模型</text>
  <text x="630" y="202" font-size="14" font-weight="bold" fill="#2e7d32">🟢 低</text>

  <rect x="50" y="220" width="700" height="46" fill="#ffffff" stroke="#d0d7de"/>
  <text x="70" y="248" font-size="14" fill="#24292f">OpenClaw</text>
  <text x="330" y="248" font-size="14" fill="#24292f">開源 + 基金會，token 驅動</text>
  <text x="630" y="248" font-size="14" font-weight="bold" fill="#24292f">🟡 中低</text>

  <rect x="50" y="266" width="700" height="46" fill="#ffffff" stroke="#d0d7de"/>
  <text x="70" y="294" font-size="14" fill="#24292f">Hermes Agent</text>
  <text x="330" y="294" font-size="14" fill="#24292f">開源 MIT，token 驅動</text>
  <text x="630" y="294" font-size="14" font-weight="bold" fill="#24292f">🟡 中低</text>

  <rect x="50" y="312" width="700" height="46" fill="#ffffff" stroke="#d0d7de"/>
  <text x="70" y="340" font-size="14" fill="#24292f">Claude Code / Cowork</text>
  <text x="330" y="340" font-size="14" fill="#24292f">Anthropic 官方產品</text>
  <text x="630" y="340" font-size="14" font-weight="bold" fill="#2e7d32">🟢 低</text>

  <rect x="50" y="358" width="700" height="46" fill="#ffffff" stroke="#d0d7de"/>
  <text x="70" y="386" font-size="14" fill="#24292f">Manus</text>
  <text x="330" y="386" font-size="14" fill="#24292f">無自有模型，燒錢補貼</text>
  <text x="630" y="386" font-size="14" font-weight="bold" fill="#d32f2f">🔴 高</text>

  <!-- note -->
  <rect x="50" y="424" width="700" height="58" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="400" y="448" text-anchor="middle" font-size="13" fill="#24292f">開源工具評「中低」不是因為不穩定，而是依賴社群維護；</text>
  <text x="400" y="468" text-anchor="middle" font-size="13" fill="#24292f">反過來，它不會有「公司倒了一切消失」的風險</text>

  <text x="740" y="506" text-anchor="end" font-size="12" fill="#8b949e">launchdock.app</text>
</svg>
