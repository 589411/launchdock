<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Noto Sans TC', sans-serif">
  <rect x="1" y="1" width="798" height="498" rx="12" fill="#f8fafc" stroke="#d0d7de" stroke-width="2"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f3460">Layer 2：Gemini × Google Workspace 整合</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#24292f">「你的資料在哪裡，你的工具就應該在哪裡。」</text>

  <!-- connectors -->
  <line x1="240" y1="230" x2="500" y2="128" stroke="#1976d2" stroke-width="2"/>
  <line x1="240" y1="245" x2="500" y2="200" stroke="#1976d2" stroke-width="2"/>
  <line x1="240" y1="260" x2="500" y2="272" stroke="#1976d2" stroke-width="2"/>
  <line x1="240" y1="275" x2="500" y2="344" stroke="#1976d2" stroke-width="2"/>
  <text x="370" y="240" text-anchor="middle" font-size="13" fill="#24292f">不需要複製貼上，</text>
  <text x="370" y="258" text-anchor="middle" font-size="13" fill="#24292f">AI 跟你的工具直接溝通</text>

  <!-- Gemini node -->
  <rect x="70" y="205" width="170" height="95" rx="10" fill="#1976d2"/>
  <text x="155" y="248" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">Gemini</text>
  <text x="155" y="275" text-anchor="middle" font-size="13" fill="#ffffff">Google 生態整合</text>

  <!-- Calendar -->
  <rect x="500" y="100" width="250" height="56" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="516" y="124" font-size="15" font-weight="bold" fill="#0f3460">Calendar</text>
  <text x="516" y="144" font-size="13" fill="#24292f">查上週的會議紀錄</text>

  <!-- Drive -->
  <rect x="500" y="172" width="250" height="56" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="516" y="196" font-size="15" font-weight="bold" fill="#0f3460">Drive</text>
  <text x="516" y="216" font-size="13" fill="#24292f">整理 Drive 裡的文件</text>

  <!-- Gmail -->
  <rect x="500" y="244" width="250" height="56" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="516" y="268" font-size="15" font-weight="bold" fill="#0f3460">Gmail</text>
  <text x="516" y="288" font-size="13" fill="#24292f">全在 Google 生態的工作中樞</text>

  <!-- Docs -->
  <rect x="500" y="316" width="250" height="56" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="516" y="340" font-size="15" font-weight="bold" fill="#0f3460">Docs</text>
  <text x="516" y="360" font-size="13" fill="#24292f">把討論摘要寫進 Docs</text>

  <!-- ceiling note -->
  <rect x="50" y="400" width="700" height="58" rx="8" fill="#ffffff" stroke="#d32f2f"/>
  <text x="400" y="424" text-anchor="middle" font-size="13" font-weight="bold" fill="#d32f2f">天花板：只能在 Google 生態裡整合</text>
  <text x="400" y="444" text-anchor="middle" font-size="13" fill="#24292f">想整合 Notion、跑排程任務、操作自己電腦上的其他軟體，就碰到邊界了</text>

  <text x="740" y="482" text-anchor="end" font-size="12" fill="#8b949e">launchdock.app</text>
</svg>
