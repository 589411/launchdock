<svg viewBox="0 0 800 640" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Noto Sans TC', sans-serif">
  <rect x="1" y="1" width="798" height="638" rx="12" fill="#f8fafc" stroke="#d0d7de" stroke-width="2"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f3460">Layer 4 工具選擇路線圖</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#24292f">廣場上有好幾個出口，沒有哪個出口是「正確答案」——看你能接受多少維護責任</text>

  <!-- connectors -->
  <line x1="240" y1="341" x2="320" y2="143" stroke="#8b949e" stroke-width="2"/>
  <line x1="240" y1="341" x2="320" y2="275" stroke="#8b949e" stroke-width="2"/>
  <line x1="240" y1="341" x2="320" y2="407" stroke="#8b949e" stroke-width="2"/>
  <line x1="240" y1="341" x2="320" y2="539" stroke="#8b949e" stroke-width="2"/>

  <!-- hub -->
  <rect x="40" y="296" width="200" height="90" rx="10" fill="#0f3460"/>
  <text x="140" y="334" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">Layer 4｜內部整合層</text>
  <text x="140" y="360" text-anchor="middle" font-size="13" fill="#ffffff">四個出口，各有代價</text>

  <!-- Claude Code -->
  <rect x="320" y="84" width="440" height="118" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="336" y="110" font-size="16" font-weight="bold" fill="#1976d2">🔵 Claude Code</text>
  <text x="336" y="134" font-size="13" fill="#24292f">強項：檔案系統、terminal、程式碼</text>
  <text x="336" y="156" font-size="13" fill="#24292f">適合：開發者，或願意學用 CLI 的人</text>
  <text x="336" y="178" font-size="13" fill="#24292f">注意：需較高 Anthropic 訂閱等級與 CLI 基礎</text>

  <!-- Claude Cowork -->
  <rect x="320" y="216" width="440" height="118" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="336" y="242" font-size="16" font-weight="bold" fill="#1976d2">🔵 Claude Cowork（舊稱 Claude Computer Use）</text>
  <text x="336" y="266" font-size="13" fill="#24292f">強項：桌面任務自動化</text>
  <text x="336" y="288" font-size="13" fill="#24292f">適合：非技術用戶，想讓 AI 直接操作桌面</text>
  <text x="336" y="310" font-size="13" fill="#24292f">特點：不需要懂 CLI</text>

  <!-- OpenClaw -->
  <rect x="320" y="348" width="440" height="118" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="336" y="374" font-size="16" font-weight="bold" fill="#1976d2">🔵 OpenClaw</text>
  <text x="336" y="398" font-size="13" fill="#24292f">強項：自定義工作流、Agent orchestration</text>
  <text x="336" y="420" font-size="13" fill="#24292f">適合：用設定檔（Markdown）管理工作流、要穩定成熟社群</text>
  <text x="336" y="442" font-size="13" fill="#24292f">特點：整合廣度，設定難度相對較低</text>

  <!-- Hermes Agent -->
  <rect x="320" y="480" width="440" height="118" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="336" y="506" font-size="16" font-weight="bold" fill="#1976d2">🔵 Hermes Agent</text>
  <text x="336" y="530" font-size="13" fill="#24292f">核心哲學：學習深度 + 自我改善，越用越強</text>
  <text x="336" y="552" font-size="13" fill="#24292f">適合：模型選擇完全自由、接受自己維運 VPS 伺服器</text>
  <text x="336" y="574" font-size="13" fill="#24292f">部署：Docker 為主，VPS 約 $5–7 美元/月 + token 費</text>

  <text x="740" y="622" text-anchor="end" font-size="12" fill="#8b949e">launchdock.app</text>
</svg>
